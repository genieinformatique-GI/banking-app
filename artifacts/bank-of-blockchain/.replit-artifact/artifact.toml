kind = "web"
previewPath = "/"
title = "Bank of Blockchain"
version = "1.0.0"
id = "artifacts/bank-of-blockchain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22847
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bank-of-blockchain run dev"

[services.env]
PORT = "22847"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bank-of-blockchain", "run", "build"]
publicDir = "artifacts/bank-of-blockchain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

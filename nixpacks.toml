[phases.setup]
nixPkgs = ["...", "nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @workspace/db run build",
  "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/bank-of-blockchain run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production node artifacts/api-server/dist/index.cjs"

[variables]
NODE_ENV = "production"
PORT = "3000"
